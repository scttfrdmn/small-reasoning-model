# Config C — ~2.87B parameters
# Hardware: AWS Trn2 (trn2.48xlarge) or cloud H100 80GB — full experiment

model:
  d_model: 3072            # 3072 / 128 = 24 ✓ tile-aligned
  n_layers: 28
  n_heads: 24              # 24 × 128 = 3072 = d_model ✓
  n_kv_heads: 6            # GQA ratio 4:1
  head_dim: 128            # maps to Trn2 SBUF partition dimension
  ffn_intermediate: 8192   # 8192 / 128 = 64 ✓ tile-aligned
  vocab_size: 32768        # 32768 / 128 = 256 ✓ tile-aligned
  max_seq_len: 32768
  rope_base: 500000
  dropout: 0.0
  tie_embeddings: true
  norm_eps: 1.0e-5

# Parameter breakdown:
#   Per-layer attention: 23.59M
#   Per-layer FFN:       75.50M
#   Per-layer total:     99.1M × 28 = 2774M
#   Embedding (tied):    100.7M
#   Total:               ~2.87B

pretrain:
  max_tokens: 100_000_000_000  # 100B tokens (~33× Chinchilla, deliberate overtraining)
  max_seq_len: 2048
  batch_size: 4
  grad_accum: 256              # effective batch ~2M tokens/step
  optimizer: adamw
  lr: 3.0e-4
  lr_min: 3.0e-5
  beta1: 0.9
  beta2: 0.95
  eps: 1.0e-8
  weight_decay: 0.1
  grad_clip: 1.0
  warmup_fraction: 0.02
  dtype: bfloat16
  grad_checkpointing: true

  # Trainium parallelism (trn2.48xlarge, 16 chips, 32 NeuronCores)
  tensor_parallel: 16          # increase TP degree for 3B
  data_parallel: 2

sft:
  lr: 2.0e-5
  lr_min: 2.0e-6
  epochs: 2
  batch_size: 64
  max_seq_len: 4096
  warmup_fraction: 0.03
  dtype: bfloat16

grpo:
  lr: 5.0e-7
  group_size: 8
  kl_coeff: 0.01
  ppo_clip_low: 0.20
  ppo_clip_high: 0.28
  max_gen_tokens: 2048
  temperature: 0.8
  steps: 20000
  dtype: bfloat16
