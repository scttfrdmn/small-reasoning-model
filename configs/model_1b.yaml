# Config B — ~953M parameters
# Hardware: AWS Trn2 (trn2.48xlarge, 16× Trainium2 chips) — primary experiment
# Cost estimate: ~$700–1,000 at Trn2 on-demand for full 50B token run

model:
  d_model: 2048            # 2048 / 128 = 16 ✓ tile-aligned
  n_layers: 20
  n_heads: 16              # 16 × 128 = 2048 = d_model ✓
  n_kv_heads: 4            # GQA ratio 4:1
  head_dim: 128            # maps to Trn2 SBUF partition dimension
  ffn_intermediate: 5504   # 5504 / 128 = 43 ✓ tile-aligned
  vocab_size: 32768        # 32768 / 128 = 256 ✓ tile-aligned
  max_seq_len: 16384
  rope_base: 500000
  dropout: 0.0
  tie_embeddings: true
  norm_eps: 1.0e-5

# Parameter breakdown:
#   Per-layer attention: 10.49M
#   Per-layer FFN:       33.82M
#   Per-layer total:     44.3M × 20 = 886M
#   Embedding (tied):    67.1M
#   Total:               ~953M

pretrain:
  max_tokens: 50_000_000_000   # 50B tokens (~50× Chinchilla, deliberate overtraining)
  max_seq_len: 2048
  batch_size: 4
  grad_accum: 128              # effective batch ~1M tokens/step
  optimizer: adamw
  lr: 3.0e-4
  lr_min: 3.0e-5
  beta1: 0.9
  beta2: 0.95
  eps: 1.0e-8
  weight_decay: 0.1
  grad_clip: 1.0
  warmup_fraction: 0.02
  dtype: bfloat16
  grad_checkpointing: true

  # Trainium parallelism (trn2.48xlarge, 16 chips, 32 NeuronCores)
  tensor_parallel: 8           # splits attention heads + FFN across 8 NeuronCores
  data_parallel: 4             # 4 replica groups

sft:
  lr: 2.0e-5
  lr_min: 2.0e-6
  epochs: 2
  batch_size: 128
  max_seq_len: 4096
  warmup_fraction: 0.03
  dtype: bfloat16

grpo:
  lr: 5.0e-7
  group_size: 8
  kl_coeff: 0.01
  ppo_clip_low: 0.20
  ppo_clip_high: 0.28
  max_gen_tokens: 2048
  temperature: 0.8
  steps: 10000
  dtype: bfloat16
